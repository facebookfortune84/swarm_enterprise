# ==============================================================================
# SOVEREIGN SDK: SWARM ENTERPRISE INFRASTRUCTURE MANIFEST
# Version: 1.0.5-Alpha
# Architecture: Fractal Hierarchical
# Description: Hardened Native Volumes and STRICT YAML spacing.
# ==============================================================================

services:
  # 1. THE PERIMETER: Cloudflare Tunnel
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: swarmenterprise-tunnel-1
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    command: tunnel --no-autoupdate run --protocol http2
    networks:
      - swarm_network

  # 2. THE BRAIN: FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: swarmenterprise-backend-1
    env_file: .env
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - ./output:/app/output
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - swarm_network

  # 3. THE COMMAND CENTER: React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: swarmenterprise-frontend-1
    restart: always
    networks:
      - swarm_network

  # 4. THE NERVOUS SYSTEM: ChromaDB
  chromadb:
    image: chromadb/chroma
    container_name: swarmenterprise-chromadb-1
    volumes:
      - chroma_data:/chroma/chroma
    restart: always
    networks:
      - swarm_network

  # 5. THE DATA VAULT: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: swarmenterprise-db-1
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-SovereignSwarm2026!}
      - POSTGRES_DB=${POSTGRES_DB:-swarm_enterprise}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-swarm_enterprise}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm_network

  # 6. THE MESSAGE BUS: Redis
  redis:
    image: redis:alpine
    container_name: swarmenterprise-redis-1
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm_network

  # 7. THE IMMUNE SYSTEM: SRE Monitor
  monitor:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: swarmenterprise-monitor-1
    command: python backend/core/orchestrator.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    restart: always
    networks:
      - swarm_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 8. THE DELIVERY WINDOW: Output Viewer
  output_viewer:
    image: halverneus/static-file-server:latest
    container_name: swarmenterprise-output-viewer-1
    ports:
      - "8080:8080"
    restart: always
    volumes:
      - ./output:/web
    environment:
      - PORT=8080
    networks:
      - swarm_network

networks:
  swarm_network:
    name: swarm_network
    driver: bridge

# SRE HARDENING: Docker Native Volumes bypass NTFS bridge locks
volumes:
  pg_data:
  chroma_data: